openapi: 3.1.0
info:
  title: PharmaSync API
  version: 0.1.0
  description: Pilot API contract for inventory visibility, integration health, signals, and audit evidence.
paths:
  /health:
    get:
      summary: Health check
      description: Reports API, database, object storage, and worker heartbeat health without returning secrets.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies are unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/context:
    get:
      summary: Get authenticated workforce context
      description: Returns the authenticated workforce user, organization, permitted sites, roles, and trace ID derived from accepted OIDC-compatible claims.
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Authenticated workforce context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkforceAuthContextResponse"
        "401":
          description: Missing or invalid bearer token
  /v1/integration/feeds:
    post:
      summary: Submit a partner inventory feed
      responses:
        "202":
          description: Feed accepted for processing
  /api/v1/integration/health:
    get:
      summary: View integration health
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Integration health status
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/integration/mappings/{id}:
    patch:
      summary: Change an integration mapping
      security:
        - workforceBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Integration mapping change accepted
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/inventory/stock:
    get:
      summary: List current stock positions
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Current stock positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockPositionsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/medication-products:
    get:
      summary: Search medication product reference data
      description: Looks up public medication reference products by NDC or descriptive name fields.
      security:
        - workforceBearer: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: NDC fragment or product/name/ingredient/labeler search term.
      responses:
        "200":
          description: Medication products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationProductsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/sites:
    get:
      summary: List permitted organization sites
      description: Returns active sites for the authenticated organization and permitted-site scope.
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Permitted active sites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitesResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/signals:
    get:
      summary: List shortage, overstock, and expiration signals
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Risk signals
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/quarantine:
    get:
      summary: List quarantined integration payloads
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Quarantine records
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/quarantine/{id}/reprocessings:
    post:
      summary: Reprocess a quarantined payload
      security:
        - workforceBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reprocessing queued
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/audit/events:
    get:
      summary: List auditable platform events
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Audit events
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/evidence/packages:
    post:
      summary: Generate an evidence package
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Evidence package generation queued
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/configuration/access:
    patch:
      summary: Manage access configuration
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Configuration change accepted
        "403":
          description: Authenticated user lacks the required role permission
components:
  securitySchemes:
    workforceBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    WorkforceAuthContext:
      type: object
      required: [userId, organizationId, permittedSiteIds, roles, traceId, subject, issuer, audience]
      additionalProperties: false
      properties:
        userId:
          type: string
        organizationId:
          type: string
        permittedSiteIds:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string
        traceId:
          type: string
        subject:
          type: string
        issuer:
          type: string
          format: uri
        audience:
          type: array
          items:
            type: string
    WorkforceAuthContextResponse:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/WorkforceAuthContext"
    MedicationProduct:
      type: object
      required:
        - id
        - ndc
        - normalizedNdc
        - proprietaryName
        - nonproprietaryName
        - dosageForm
        - route
        - labelerName
        - productType
        - marketingCategory
        - activeIngredient
        - strength
        - source
      additionalProperties: false
      properties:
        id:
          type: integer
        ndc:
          type: string
        normalizedNdc:
          type: string
        proprietaryName:
          type: string
        nonproprietaryName:
          type: string
        dosageForm:
          type: string
        route:
          type: string
        labelerName:
          type: string
        productType:
          type: string
        marketingCategory:
          type: string
        activeIngredient:
          type: string
        strength:
          type: string
        source:
          type: string
    MedicationProductsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MedicationProduct"
        meta:
          type: object
          required: [query, organizationId, traceId]
          additionalProperties: false
          properties:
            query:
              type:
                - string
                - "null"
            organizationId:
              type: string
            traceId:
              type: string
    Site:
      type: object
      required: [siteKey, organizationId, name, type, status, city, region, country]
      additionalProperties: false
      properties:
        siteKey:
          type: string
        organizationId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [warehouse, pharmacy, clinic, program-location]
        status:
          type: string
          enum: [active, inactive]
        city:
          type: string
        region:
          type: string
        country:
          type: string
    SitesResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Site"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    ExpirationStatus:
      type: string
      enum: [expired, near-expiry, ok]
    StockPosition:
      type: object
      required:
        - id
        - organizationId
        - siteId
        - medicationName
        - lotNumber
        - expirationDate
        - expirationStatus
        - quantityOnHand
      additionalProperties: false
      properties:
        id:
          type: string
        organizationId:
          type: string
        siteId:
          type: string
        medicationName:
          type: string
        lotNumber:
          type: string
        expirationDate:
          type: string
          format: date
        expirationStatus:
          $ref: "#/components/schemas/ExpirationStatus"
        quantityOnHand:
          type: number
    StockPositionsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/StockPosition"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    HealthStatus:
      type: string
      enum: [up, down]
    HealthCheck:
      type: object
      required: [name, status, message]
      additionalProperties: false
      properties:
        name:
          type: string
          enum: [database, objectStorage, worker]
        status:
          $ref: "#/components/schemas/HealthStatus"
        message:
          type: string
        observedAt:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required: [status, checkedAt, service, checks]
      additionalProperties: false
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        checkedAt:
          type: string
          format: date-time
        service:
          type: object
          required: [name, status]
          additionalProperties: false
          properties:
            name:
              type: string
            status:
              type: string
              enum: [up]
        checks:
          type: object
          required: [database, objectStorage, worker]
          additionalProperties: false
          properties:
            database:
              $ref: "#/components/schemas/HealthCheck"
            objectStorage:
              $ref: "#/components/schemas/HealthCheck"
            worker:
              $ref: "#/components/schemas/HealthCheck"
