openapi: 3.1.0
info:
  title: PharmaSync API
  version: 0.1.0
  description: Pilot API contract for inventory visibility, integration health, signals, and audit evidence.
paths:
  /health:
    get:
      summary: Health check
      description: Reports API, database, object storage, and worker heartbeat health without returning secrets.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies are unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/context:
    get:
      summary: Get authenticated workforce context
      description: Returns the authenticated workforce user, organization, permitted sites, roles, and trace ID derived from accepted OIDC-compatible claims.
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Authenticated workforce context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkforceAuthContextResponse"
        "401":
          description: Missing or invalid bearer token
  /v1/integration/feeds:
    post:
      summary: Submit a partner inventory feed
      description: Accepts JSON batches or CSV feeds, archives the raw payload, and returns a trace ID immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerFeedJsonSubmission"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PartnerFeedCsvSubmission"
      responses:
        "202":
          description: Feed accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerFeedAcceptedResponse"
  /api/v1/integration/health:
    get:
      summary: View integration health
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Integration health status
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/integration/mappings/{id}:
    patch:
      summary: Change an integration mapping
      security:
        - workforceBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Integration mapping change accepted
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/inventory/stock:
    get:
      summary: List current stock positions
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Current stock positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockPositionsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/medication-products:
    get:
      summary: Search medication product reference data
      description: Looks up public medication reference products by NDC or descriptive name fields.
      security:
        - workforceBearer: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: NDC fragment or product/name/ingredient/labeler search term.
      responses:
        "200":
          description: Medication products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationProductsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/sites:
    get:
      summary: List permitted organization sites
      description: Returns active sites for the authenticated organization and permitted-site scope.
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Permitted active sites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitesResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/signals:
    get:
      summary: List shortage, overstock, and expiration signals
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Risk signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSignalsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/quarantine:
    get:
      summary: List quarantined integration payloads
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Quarantine records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuarantineRecordsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/quarantine/{id}/reprocessings:
    post:
      summary: Reprocess a quarantined payload
      security:
        - workforceBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reprocessing queued
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/audit/events:
    get:
      summary: List auditable platform events
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsResponse"
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/evidence/packages:
    post:
      summary: Generate an evidence package
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Evidence package generation queued
        "403":
          description: Authenticated user lacks the required role permission
  /api/v1/configuration/access:
    patch:
      summary: Manage access configuration
      security:
        - workforceBearer: []
      responses:
        "200":
          description: Configuration change accepted
        "403":
          description: Authenticated user lacks the required role permission
components:
  securitySchemes:
    workforceBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    WorkforceAuthContext:
      type: object
      required: [userId, organizationId, permittedSiteIds, roles, traceId, subject, issuer, audience]
      additionalProperties: false
      properties:
        userId:
          type: string
        organizationId:
          type: string
        permittedSiteIds:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string
        traceId:
          type: string
        subject:
          type: string
        issuer:
          type: string
          format: uri
        audience:
          type: array
          items:
            type: string
    WorkforceAuthContextResponse:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/WorkforceAuthContext"
    PartnerFeedMovement:
      type: object
      required:
        - source_event_id
        - event_type
        - site_code
        - ndc
        - lot_number
        - expiration_date
        - quantity_delta
        - occurred_at
      additionalProperties: false
      properties:
        source_event_id:
          type: string
        event_type:
          type: string
        site_code:
          type: string
        ndc:
          type: string
        lot_number:
          type: string
        expiration_date:
          type: string
          format: date
        quantity_delta:
          type: number
        occurred_at:
          type: string
          format: date-time
        source_location:
          type:
            - string
            - "null"
        destination_location:
          type:
            - string
            - "null"
    PartnerFeedJsonSubmission:
      type: object
      required: [format, partner_id, feed_id, submitted_at, movements]
      additionalProperties: false
      properties:
        format:
          type: string
          enum: [json]
        partner_id:
          type: string
        feed_id:
          type: string
        submitted_at:
          type: string
          format: date-time
        movements:
          type: array
          items:
            $ref: "#/components/schemas/PartnerFeedMovement"
    PartnerFeedCsvSubmission:
      type: object
      required: [format, partner_id, feed_id, submitted_at, csv]
      additionalProperties: false
      properties:
        format:
          type: string
          enum: [csv]
        partner_id:
          type: string
        feed_id:
          type: string
        submitted_at:
          type: string
          format: date-time
        csv:
          type: string
    PartnerFeedAcceptedResponse:
      type: object
      required: [data]
      additionalProperties: false
      properties:
        data:
          type: object
          required: [status, traceId, partnerId, feedId, payloadHash, archivePath, receivedAt, format]
          additionalProperties: false
          properties:
            status:
              type: string
              enum: [accepted]
            traceId:
              type: string
            partnerId:
              type: string
            feedId:
              type: string
            payloadHash:
              type: string
            archivePath:
              type: string
            receivedAt:
              type: string
              format: date-time
            format:
              type: string
              enum: [csv, json]
    MedicationProduct:
      type: object
      required:
        - id
        - ndc
        - normalizedNdc
        - proprietaryName
        - nonproprietaryName
        - dosageForm
        - route
        - labelerName
        - productType
        - marketingCategory
        - activeIngredient
        - strength
        - source
      additionalProperties: false
      properties:
        id:
          type: integer
        ndc:
          type: string
        normalizedNdc:
          type: string
        proprietaryName:
          type: string
        nonproprietaryName:
          type: string
        dosageForm:
          type: string
        route:
          type: string
        labelerName:
          type: string
        productType:
          type: string
        marketingCategory:
          type: string
        activeIngredient:
          type: string
        strength:
          type: string
        source:
          type: string
    MedicationProductsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MedicationProduct"
        meta:
          type: object
          required: [query, organizationId, traceId]
          additionalProperties: false
          properties:
            query:
              type:
                - string
                - "null"
            organizationId:
              type: string
            traceId:
              type: string
    Site:
      type: object
      required: [siteKey, organizationId, name, type, status, city, region, country]
      additionalProperties: false
      properties:
        siteKey:
          type: string
        organizationId:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [warehouse, pharmacy, clinic, program-location]
        status:
          type: string
          enum: [active, inactive]
        city:
          type: string
        region:
          type: string
        country:
          type: string
    SitesResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Site"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    ExpirationStatus:
      type: string
      enum: [expired, near-expiry, ok]
    StockPosition:
      type: object
      required:
        - id
        - organizationId
        - siteId
        - medicationName
        - lotNumber
        - expirationDate
        - expirationStatus
        - quantityOnHand
        - traceId
      additionalProperties: false
      properties:
        id:
          type: string
        organizationId:
          type: string
        siteId:
          type: string
        medicationName:
          type: string
        lotNumber:
          type: string
        expirationDate:
          type: string
          format: date
        expirationStatus:
          $ref: "#/components/schemas/ExpirationStatus"
        quantityOnHand:
          type: number
        traceId:
          type: string
    StockPositionsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/StockPosition"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    RiskSignal:
      type: object
      required: [id, organizationId, siteId, traceId, type, severity]
      additionalProperties: false
      properties:
        id:
          type: string
        organizationId:
          type: string
        siteId:
          type: string
        traceId:
          type: string
        type:
          type: string
          enum: [expiration, overstock, shortage]
        severity:
          type: string
          enum: [low, medium, high]
    RiskSignalsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RiskSignal"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    QuarantineRecord:
      type: object
      required: [id, organizationId, siteId, traceId, reason]
      additionalProperties: false
      properties:
        id:
          type: string
        organizationId:
          type: string
        siteId:
          type: string
        traceId:
          type: string
        reason:
          type: string
    QuarantineRecordsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/QuarantineRecord"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    AuditEvent:
      type: object
      required: [id, organizationId, traceId, action]
      additionalProperties: false
      properties:
        id:
          type: string
        organizationId:
          type: string
        siteId:
          type:
            - string
            - "null"
        traceId:
          type: string
        action:
          type: string
    AuditEventsResponse:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        meta:
          type: object
          required: [organizationId, permittedSiteIds, traceId]
          additionalProperties: false
          properties:
            organizationId:
              type: string
            permittedSiteIds:
              type: array
              items:
                type: string
            traceId:
              type: string
    HealthStatus:
      type: string
      enum: [up, down]
    HealthCheck:
      type: object
      required: [name, status, message]
      additionalProperties: false
      properties:
        name:
          type: string
          enum: [database, objectStorage, worker]
        status:
          $ref: "#/components/schemas/HealthStatus"
        message:
          type: string
        observedAt:
          type: string
          format: date-time
    HealthResponse:
      type: object
      required: [status, checkedAt, service, checks]
      additionalProperties: false
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        checkedAt:
          type: string
          format: date-time
        service:
          type: object
          required: [name, status]
          additionalProperties: false
          properties:
            name:
              type: string
            status:
              type: string
              enum: [up]
        checks:
          type: object
          required: [database, objectStorage, worker]
          additionalProperties: false
          properties:
            database:
              $ref: "#/components/schemas/HealthCheck"
            objectStorage:
              $ref: "#/components/schemas/HealthCheck"
            worker:
              $ref: "#/components/schemas/HealthCheck"
