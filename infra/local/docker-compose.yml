services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pharmasync
      POSTGRES_USER: pharmasync
      POSTGRES_PASSWORD: pharmasync
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmasync -d pharmasync"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pharmasync
      MINIO_ROOT_PASSWORD: pharmasync
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
